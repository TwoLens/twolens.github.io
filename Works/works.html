<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | TwoLens Photography</title>
    <link rel="icon" type="image/png" href="../profiles/logo.png">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-dark: #020202;
            --accent: #f4b400;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(25px) saturate(180%);
            --ios-spring: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- LIQUID BACKGROUND --- */
        .liquid-container { position: fixed; inset: 0; z-index: -1; background: #000; }
        .blob {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(244, 180, 0, 0.08) 0%, transparent 60%);
            border-radius: 50%; filter: blur(80px);
            animation: move 20s infinite alternate ease-in-out;
        }
        @keyframes move { from { transform: translate(-15%, -15%); } to { transform: translate(25%, 25%); } }

        /* --- iOS NAV --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; position: fixed; width: 90%; top: 25px; left: 5%;
            z-index: 1000; background: rgba(15, 15, 15, 0.5);
            backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 30px;
        }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: rgba(255, 255, 255, 0.6); text-decoration: none; font-size: 0.9rem; transition: 0.4s; }
        .nav-links a.active { color: var(--accent); }

        .container { max-width: 1200px; margin: 0 auto; padding: 180px 5% 100px; min-height: 100vh; }

        /* --- CATEGORY INTERFACE --- */
        #category-interface { transition: 0.5s var(--ios-spring); }
        .works-header { text-align: center; margin-bottom: 60px; }
        .works-header h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; }

        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px;
        }

        .card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur); border-radius: 44px; padding: 70px 20px;
            text-align: center; cursor: pointer; transition: 0.6s var(--ios-spring);
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { transform: translateY(-15px); border-color: var(--accent); background: rgba(255,255,255,0.08); }

        /* --- UNIVERSAL SMOOTH ICON TRANSITION --- */
        .icon-wrapper {
            position: relative; width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
        }
        .icon-base { position: absolute; transition: all 0.8s var(--ios-spring); }
        .icon-hover { opacity: 0; transform: scale(0.4) rotate(-45deg); }

        /* General Hover Behavior */
        .card:hover .icon-default { opacity: 0; transform: scale(0.6) rotate(30deg); }
        .card:hover .icon-hover { opacity: 1; transform: scale(1.1) rotate(0deg); color: var(--accent); }

        /* --- WEDDING ICON --- */
        .couple-box { display: flex; align-items: flex-end; position: absolute; transition: all 0.8s var(--ios-spring); opacity: 0; transform: translateY(10px); }
        .groom-icon, .bride-icon { transition: all 0.8s var(--ios-spring); }
        .card:hover .couple-box { opacity: 1; transform: translateY(0); }
        .card:hover .groom-icon { transform: translateX(8px); color: #fff; }
        .card:hover .bride-icon { transform: translateX(-8px); color: var(--accent); }

        /* --- EFFECTS --- */
        .confetti { position: absolute; width: 6px; height: 6px; border-radius: 2px; opacity: 0; pointer-events: none; }
        .card:hover .confetti { animation: scatter 1s ease-out forwards; opacity: 1; }
        @keyframes scatter {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }

        .flash-bulb { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; opacity: 0; z-index: 10; }
        .card:hover .flash-bulb { animation: burst 0.5s infinite; }
        @keyframes burst { 0%, 100% { opacity: 0; } 5% { opacity: 1; box-shadow: 0 0 30px 15px white; } 40% { opacity: 0; } }

        .card span { margin-top: 25px; font-size: 0.75rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; opacity: 0.3; transition: 0.4s; }
        .card:hover span { opacity: 1; }

        /* --- PEOPLE INTERFACE --- */
        #people-interface { display: none; opacity: 0; transform: translateY(30px); transition: 0.6s var(--ios-spring); }
        .back-btn {
            display: inline-flex; align-items: center; gap: 10px; background: var(--glass-bg);
            border: 1px solid var(--glass-border); padding: 12px 25px; border-radius: 50px;
            color: #fff; cursor: pointer; margin-bottom: 40px; transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; }
        
        .people-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }
        
        .person-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 35px;
            overflow: hidden; transition: 0.5s var(--ios-spring); backdrop-filter: var(--glass-blur);
        }
        .person-card:hover { transform: scale(1.02); box-shadow: 0 15px 45px rgba(244, 180, 0, 0.4); }
        .person-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .person-info { padding: 25px; }
        .person-info h3 { margin-bottom: 5px; font-size: 1.2rem; }
        .person-info p { opacity: 0.6; font-size: 0.85rem; margin-bottom: 20px; }
        
        .view-btn {
            display: block; width: 100%; text-align: center; padding: 12px; background: rgba(255,255,255,0.05);
            border-radius: 15px; color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 600; transition: 0.3s;
        }
        .view-btn:hover { background: var(--accent); color: #000; }

        @media (max-width: 768px) { nav { width: 92%; left: 4%; } .nav-links { display: none; } }
    </style>
</head>
<body>

    <div class="liquid-container"><div class="blob"></div></div>

    <nav>
        <div class="logo">Two<span>Lens</span></div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../about.html">About</a></li>
            <li><a href="#">Works</a></li>
            <li><a href="../services.html">Services</a></li>
            <li><a href="../contact.html">Contact</a></li>
            <li><a href="../review.html">Reviews</a></li>
        </ul>
    </nav>

    <div class="container">
        
        <div id="category-interface">
            <header class="works-header" data-aos="fade-down">
                <h1>Our Works</h1>
            </header>

            <div class="icon-grid">
                <div class="card" onclick="openCategory('Birthdays')" onmouseenter="spawnConfetti(this)" data-aos="fade-up">
                    <div class="confetti-root"></div>
                    <div class="icon-wrapper">
                        <i data-lucide="cake" class="icon-base icon-default" size="48"></i>
                        <i data-lucide="party-popper" class="icon-base icon-hover" size="48"></i>
                    </div>
                    <span>Birthdays</span>
                </div>

                <div class="card" onclick="openCategory('Weddings')" data-aos="fade-up" data-aos-delay="100">
                    <div class="icon-wrapper">
                        <i data-lucide="heart" class="icon-base icon-default" size="48"></i>
                        <div class="couple-box">
                            <i data-lucide="user" class="groom-icon" size="36"></i>
                            <i data-lucide="user" class="bride-icon" size="30"></i>
                        </div>
                    </div>
                    <span>Weddings</span>
                </div>

                <div class="card" onclick="openCategory('Events')" data-aos="fade-up" data-aos-delay="200">
                    <div class="icon-wrapper">
                        <div class="flash-bulb" style="top: 10px; right: 10px;"></div>
                        <i data-lucide="camera" class="icon-base icon-default" size="48"></i>
                        <i data-lucide="aperture" class="icon-base icon-hover" size="48"></i>
                    </div>
                    <span>Events</span>
                </div>

                <div class="card" onclick="openCategory('Portraits')" data-aos="fade-up" data-aos-delay="300">
                    <div class="icon-wrapper">
                        <i data-lucide="user" class="icon-base icon-default" size="52"></i>
                        <i data-lucide="smile" class="icon-base icon-hover" size="52"></i>
                    </div>
                    <span>Portraits</span>
                </div>
            </div>
        </div>

        <div id="people-interface">
            <button class="back-btn" onclick="closeCategory()">
                <i data-lucide="arrow-left" size="18"></i> Back
            </button>
            <h2 id="category-name" style="font-size: 2.5rem; margin-bottom: 40px;">Category</h2>
            <div class="people-grid" id="people-list"></div>
        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        lucide.createIcons();
        AOS.init({ duration: 1000, once: true });

        const shootData = {
            'Birthdays': [
                { name: 'Kasundi Amarasinghe', date: 'March 2026', img: 'https://res.cloudinary.com/dtetdrnjy/image/upload/v1776445909/2_ceiy08.jpg', page: './gallery/Portraits/kasundi.html' }
                
            ],
            'Weddings': [
                
            ],
            'Portraits': [
                
            ],
            'Events': [
               
            ]
        };

        function spawnConfetti(card) {
            const root = card.querySelector('.confetti-root');
            if(!root) return;
            root.innerHTML = '';
            const colors = ['#f4b400', '#ffffff', '#ff3040'];
            for (let i = 0; i < 20; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.background = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = '50%'; conf.style.top = '40%';
                conf.style.setProperty('--x', (Math.random() * 300 - 150) + 'px');
                conf.style.setProperty('--y', (Math.random() * -200 - 50) + 'px');
                root.appendChild(conf);
            }
        }

        function openCategory(cat) {
            const list = document.getElementById('people-list');
            document.getElementById('category-name').innerText = cat;
            list.innerHTML = '';
            
            const people = shootData[cat] || [];
            
            if(people.length === 0) {
                list.innerHTML = `<p style="opacity:0.5; grid-column: 1/-1;">No shoots found in this category yet.</p>`;
            } else {
                people.forEach(p => {
                    list.innerHTML += `
                        <div class="person-card" data-aos="fade-up">
                            <img src="${p.img}" class="person-img" alt="${p.name}">
                            <div class="person-info">
                                <h3>${p.name}</h3>
                                <p>${p.date}</p>
                                <a href="${p.page}" class="view-btn">View Shoot</a>
                            </div>
                        </div>`;
                });
            }

            document.getElementById('category-interface').style.display = 'none';
            const pI = document.getElementById('people-interface');
            pI.style.display = 'block';
            
            setTimeout(() => { 
                pI.style.opacity = '1'; 
                pI.style.transform = 'translateY(0)'; 
                AOS.refresh(); 
            }, 50);
        }

        function closeCategory() {
            const pI = document.getElementById('people-interface');
            pI.style.opacity = '0';
            pI.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                pI.style.display = 'none';
                document.getElementById('category-interface').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 400);
        }
    </script>
</body>
</html>
